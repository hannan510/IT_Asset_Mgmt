<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}IT Asset Manager{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><span class="logo">🖥️</span> AssetHub</div>
    <nav>
      <a href="{{ url_for('dashboard') }}" class="{{ 'active' if request.endpoint=='dashboard' }}">📊 Dashboard</a>
      <a href="{{ url_for('asset_list') }}" class="{{ 'active' if request.endpoint in ['asset_list','asset_edit'] }}">💼 Assets</a>
      <a href="{{ url_for('asset_new') }}" class="{{ 'active' if request.endpoint=='asset_new' }}">➕ Add Asset</a>
    </nav>
  </aside>
  <main class="main">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, msg in messages %}
        <div class="flash {{ category }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</div>
</body>
</html>
